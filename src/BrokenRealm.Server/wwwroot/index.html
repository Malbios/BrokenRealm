<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BrokenRealm</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="terminal" aria-label="BrokenRealm">
      <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="chrome-menu">
        <span id="menu-toggle-label">Menu</span>
      </button>

      <div id="chrome-backdrop" class="chrome-backdrop" hidden></div>
      <aside id="chrome-menu" class="chrome-menu" hidden aria-label="Game menu">
        <div class="chrome-menu-header">
          <span id="menu-title" class="chrome-menu-title">Menu</span>
          <button id="menu-close" class="menu-close" type="button" aria-label="Close menu">&times;</button>
        </div>
        <div class="chrome-menu-body">
          <div class="tabs" role="tablist" aria-label="Mode">
            <button id="player-tab" class="tab active" type="button"><span id="player-tab-label">Player</span></button>
            <button id="admin-tab" class="tab" type="button">Admin</button>
          </div>
          <div id="account-controls" class="account-controls">
            <span id="account-display" class="account-display">Guest</span>
            <button id="logout-button" class="secondary-button" type="button" hidden><span id="logout-button-label">Logout</span></button>
          </div>
          <label id="character-label" class="menu-field" hidden>
            <span id="character-label-text">Character</span>
            <select id="character"></select>
          </label>
          <label class="menu-field">
            <span id="language-label-text">Language</span>
            <select id="culture">
              <option value="en">English</option>
              <option value="de">Deutsch</option>
            </select>
          </label>
          <div id="auth-panel" class="auth-panel">
            <form id="login-form" class="auth-form">
              <label class="menu-field">
                <span id="account-label-text">Account</span>
                <input id="login-account" name="accountId" autocomplete="username" value="prototype-account">
              </label>
              <label class="menu-field">
                <span id="password-label-text">Password</span>
                <input id="login-password" name="password" type="password" autocomplete="current-password">
              </label>
              <div class="auth-actions">
                <button type="submit"><span id="login-button-label">Login</span></button>
                <button id="register-button" class="secondary-button" type="button"><span id="register-button-label">Register</span></button>
              </div>
            </form>
          </div>
        </div>
      </aside>

      <div id="player-panel" class="panel active">
        <div class="player-body">
          <div id="log" class="log" aria-live="polite"></div>
          <aside id="minimap" class="map-rail" aria-label="Area map">
            <pre id="minimap-grid" class="minimap-grid"></pre>
          </aside>
        </div>
        <form id="command-form" class="command-row">
          <span class="prompt">&gt;</span>
          <input id="command" name="command" autocomplete="off" autofocus>
          <button type="submit"><span id="send-button-label">Send</span></button>
        </form>
      </div>
      <div id="admin-panel" class="panel admin-panel">
        <div class="editor-head">
          <div>
            <h2 id="verb-title">Behavior class editor</h2>
            <p>Edit a TypeScript behavior module and its class hierarchy.</p>
          </div>
          <div class="verb-controls">
            <label>
              <span>Module</span>
              <select id="behavior-module"></select>
            </label>
            <button id="reload-script" class="secondary-button" type="button">Reload</button>
            <button id="merge-seed-script" class="secondary-button" type="button" hidden>Merge seed</button>
            <button id="check-script" class="secondary-button" type="button">Check</button>
            <button id="save-script" type="button">Save</button>
          </div>
        </div>
        <div id="script-editor" class="script-editor" aria-label="Behavior source editor"></div>
        <textarea id="script-source" class="fallback-editor" spellcheck="false" hidden></textarea>
        <div id="module-details" class="module-details" aria-live="polite"></div>
        <div id="script-status" class="status" aria-live="polite"></div>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
