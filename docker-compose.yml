services:
  postgres:
    image: postgres:17
    container_name: broken-realm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: broken_realm
      POSTGRES_USER: broken_realm
      POSTGRES_PASSWORD: broken_realm
    ports:
      - "5432:5432"
    volumes:
      - broken_realm_postgres_data:/var/lib/postgresql/data

volumes:
  broken_realm_postgres_data: